services:
  # V1 Backend (Standard pg)
  - type: web
    name: oddo-inventory-v1
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oddo-db-v1
          property: connectionString
      - key: PORT
        value: 5000

  # V2 Backend (Prisma + Auth)
  - type: web
    name: oddo-inventory-v2
    env: node
    plan: free
    rootDir: Backend2
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oddo-db-v2
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: oddo-db-v1
    databaseName: inventory_v1
    plan: free
  - name: oddo-db-v2
    databaseName: inventory_v2
    plan: free
