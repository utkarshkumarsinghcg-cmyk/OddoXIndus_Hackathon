services:
  - type: web
    name: oddo-inventory-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oddo-db
          property: connectionString
      - key: PORT
        value: 5000

databases:
  - name: oddo-db
    databaseName: inventory_db
    user: postgres
    plan: free
