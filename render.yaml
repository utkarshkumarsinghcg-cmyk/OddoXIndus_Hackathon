services:
  - type: web
    name: oddo-inventory-backend-v2
    env: node
    rootDir: Backend2
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oddo-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: oddo-db
    databaseName: inventory_db
    user: postgres
    plan: free
