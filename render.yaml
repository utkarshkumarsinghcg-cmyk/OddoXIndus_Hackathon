services:
  # Main Backend (Prisma + Auth)
  - type: web
    name: oddo-inventory-v2
    env: node
    rootDir: Backend2
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oddo-db-v2
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: oddo-db-v2
    databaseName: inventory_v2
    plan: free
